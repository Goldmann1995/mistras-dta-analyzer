# ============================================================================
# AE 损伤机制识别流水线 —— 中央配置 (阶段 0 / 阶段 8: 全部参数集中、可复现)
# UMAP 嵌入 + HDBSCAN 聚类, 自适应分支 (param / waveform / both)
# ----------------------------------------------------------------------------
# 提醒: UMAP 嵌入中不要解读"簇间距离/簇大小"的物理含义, 只用邻接拓扑;
#       损伤机制数目不预设, 交给 HDBSCAN 自适应。
# ============================================================================

seed: 42                       # 全局随机种子 (阶段 8 可复现)

# ---------------------------------------------------------------------------
# 阶段 0/1 — 数据加载
# ---------------------------------------------------------------------------
io:
  # DTA 文件路径列表, 或包含 .DTA 的目录; specimen_id 由文件名推断
  inputs: ["tests/dta/210527-CH1-15.DTA"]
  channels: null               # null=全部通道; 或 [4, 5, 6, 7]
  load_column: null            # 若有同步载荷列, 指定标准化后列名; 否则 null
  crack_length_column: null    # 若有裂纹长度列 (如 DIC), 指定; 否则 null

# ---------------------------------------------------------------------------
# 阶段 1 — 预处理 (去噪 / 滤波 / 关联)
# ---------------------------------------------------------------------------
preprocess:
  bandpass:
    enable: true
    low_khz: 80                # 金属/复合常用 80–500 kHz, 按传感器响应定
    high_khz: 500
    order: 4
  amplitude_threshold_db: 0    # 低于该幅值(dB)的 hit 视为噪声剔除 (0=不剔除)
  duration_min_us: 0           # 低于该持续时间的 hit 剔除 (0=不剔除)
  first_arrival:               # 多传感器首达波关联 (区分直达 vs 反射)
    enable: false
    window_us: 20

# ---------------------------------------------------------------------------
# 阶段 2 — 特征表征 (分支点)
# ---------------------------------------------------------------------------
features:
  branch: "both"               # "param" | "waveform" | "both"
  param_columns: null          # null=自动选取所有可用 AE 参数列
  derive_param: true           # 派生 RA 值、平均频率、能量/时长比等
  waveform:
    # partial power 分频段 (kHz) —— 分频段能量比是关键可解释特征
    bands_khz: [[0, 150], [150, 300], [300, 450], [450, 600], [600, 1000]]
    cwt:
      enable: false            # 连续小波时频特征 (较慢, 默认关闭)
      wavelet: "morl"
      n_scales: 32
  redundancy:
    enable: true               # 相关性冗余筛查
    corr_threshold: 0.95
  scaler: "robust"             # "standard" | "robust" (保存以处理新试件)

# ---------------------------------------------------------------------------
# 阶段 3 — UMAP 嵌入
# ---------------------------------------------------------------------------
embedding:
  n_neighbors: 15              # 建议扫 5/15/30/50 (局部↔全局)
  min_dist: 0.0                # 0.0–0.1 利于聚类
  n_components: 5              # 聚类用 5–10 维
  n_components_viz: 2          # 可视化另存 2 维
  metric: "euclidean"         # 标准化后用 euclidean
  stability:                   # 嵌入稳定性评估 (把"UMAP 不可重复"反转成卖点)
    enable: true
    seeds: [0, 1, 2, 7, 42]
    trustworthiness_k: 10

# ---------------------------------------------------------------------------
# 阶段 4 — 聚类 (主引擎 HDBSCAN + 基线对比)
# ---------------------------------------------------------------------------
clustering:
  hdbscan:
    min_cluster_size: 30
    min_samples: null          # null=与 min_cluster_size 一致
    cluster_selection_method: "eom"
  baselines:
    enable: true
    kmeans_k_range: [2, 3, 4, 5, 6, 7, 8]
    gmm_k_range: [2, 3, 4, 5, 6, 7, 8]   # 用 BIC 选 k
    run_on_pca: true                     # 在 PCA 嵌入上也跑一遍基线
    pca_components: 5

# ---------------------------------------------------------------------------
# 阶段 5 — 簇 → 损伤机制标定
# ---------------------------------------------------------------------------
mapping:
  freq_feature: "peak_freq"    # 用于分机制的频率特征 (kHz): peak_freq / freq_centroid
  # 文献频带 → 机制 (材料相关! 默认给的是 CFRP 复合材料示例, 务必按实际体系调整)
  mechanism_bands:
    - {name: "matrix cracking 基体开裂", low_khz: 0,   high_khz: 150}
    - {name: "debonding 界面脱粘",       low_khz: 150, high_khz: 300}
    - {name: "pull-out 纤维拔出",        low_khz: 300, high_khz: 450}
    - {name: "fiber breakage 纤维断裂",  low_khz: 450, high_khz: 2000}

# ---------------------------------------------------------------------------
# 阶段 6 — 断裂过程 / 时序刻画
# ---------------------------------------------------------------------------
evolution:
  x_axis: "time"               # "time" | "load" | "crack_length"
  energy_column: "abs_energy"  # 累积能量用的列 (abs_energy / energy)

# ---------------------------------------------------------------------------
# 阶段 7 — 验证与稳健性
# ---------------------------------------------------------------------------
validation:
  cross_specimen:
    enable: true
    n_train_specimens: null    # null=留一法 (leave-one-out)
  ablation:
    enable: true

# ---------------------------------------------------------------------------
# 阶段 8 — 输出与封装
# ---------------------------------------------------------------------------
output:
  dir: "outputs"
  save_figures: true
  dpi: 150
  font: ["SimHei", "DejaVu Sans"]   # 中文字体
